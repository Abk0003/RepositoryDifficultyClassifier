<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Difficulty Classifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

    <!-- 1. Header -->
    <header class="bg-dark text-white py-3 mb-4">
        <div class="container">
            <h1 class="h3 mb-0">Repository Issue Classifier</h1>
        </div>
    </header>

    <div class="container">

        <!-- 2. Input Section -->
        <section id="input-section" class="card p-4 mb-4">
            <h5 class="mb-3">Fetch Issues from GitHub</h5>
            <div class="d-flex gap-2">
                <input type="text" id="repo-url" class="form-control" placeholder="https://github.com/owner/repo">
                <button id="fetch-btn" class="btn btn-dark">Fetch Issues</button>
            </div>
            <p id="status-msg" class="mt-2 mb-0 text-muted"></p>
        </section>

        <!-- 3. Stats Section -->
        <section id="stats-section" class="card p-4 mb-4 d-none">
            <h5 class="mb-3">Issue Distribution</h5>
            <div style="width: 300px; margin: auto;">
                <canvas id="pie-chart"></canvas>
            </div>
        </section>

        <!-- 4. Filter Section -->
        <section id="filter-section" class="card p-4 mb-4 d-none">
            <h5 class="mb-3">Filter Issues</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="search" class="form-control" placeholder="Search issues...">
                </div>
                <div class="col-md-2">
                    <select id="difficulty-filter" class="form-select">
                        <option value="">All Difficulties</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="date-from" class="form-control">
                </div>
                <div class="col-md-2">
                    <input type="date" id="date-to" class="form-control">
                </div>
                <div class="col-md-2">
                    <button id="filter-btn" class="btn btn-dark w-100">Filter</button>
                </div>
            </div>
        </section>

        <!-- 5. Issues Table -->
        <section id="issues-section" class="card p-4 mb-4 d-none">
            <h5 class="mb-3">Classified Issues <span id="issue-count" class="text-muted fs-6"></span></h5>
            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Title</th>
                            <th>Repo</th>
                            <th>Difficulty</th>
                            <th>Last Updated</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody id="issues-body">
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
